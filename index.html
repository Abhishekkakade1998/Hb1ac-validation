<!DOCTYPE html>
<html>
<head>
    <title>HbA1c Clinical Validator</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 30px;
            max-width: 600px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            background: #f1f1f1;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>HbA1c Validation System</h2>

    <form id="hba1cForm">
        <label>Patient ID</label>
        <input type="text" id="patient_id" required>

        <label>HbA1c (%)</label>
        <input type="number" step="0.1" id="hba1c" required>

        <label>Fasting Glucose (mg/dL)</label>
        <input type="number" id="fasting_glucose" required>

        <label>Haemoglobin (g/dL)</label>
        <input type="number" step="0.1" id="haemoglobin" required>

        <label>MCV</label>
        <input type="number" id="mcv" required>

        <label>Ferritin</label>
        <input type="number" id="ferritin" required>

        <label>Bilirubin</label>
        <input type="number" step="0.1" id="bilirubin" required>

        <label>RBC Lifespan (days)</label>
        <input type="number" id="rbc_lifespan_days" required>

        <button type="submit">Validate</button>
    </form>

    <div class="result" id="result"></div>
</div>

<script>
document.getElementById("hba1cForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        patient_id: document.getElementById("patient_id").value,
        hba1c: parseFloat(document.getElementById("hba1c").value),
        fasting_glucose: parseFloat(document.getElementById("fasting_glucose").value),
        haemoglobin: parseFloat(document.getElementById("haemoglobin").value),
        mcv: parseFloat(document.getElementById("mcv").value),
        ferritin: parseFloat(document.getElementById("ferritin").value),
        bilirubin: parseFloat(document.getElementById("bilirubin").value),
        rbc_lifespan_days: parseFloat(document.getElementById("rbc_lifespan_days").value)
    };

    try {
        const response = await fetch("/api/validate-hba1c", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerHTML = `
            <h3>Result</h3>
            <p><strong>Predicted Disorder:</strong> ${result.result.disorder_assessment.predicted_disorder}</p>
            <p><strong>Confidence:</strong> ${result.result.disorder_assessment.confidence}</p>
            <p><strong>Measured HbA1c:</strong> ${result.result.hba1c_values.measured_hba1c}</p>
            <p><strong>Expected HbA1c:</strong> ${result.result.hba1c_values.expected_hba1c}</p>
            <p><strong>Corrected HbA1c:</strong> ${result.result.hba1c_values.corrected_hba1c}</p>
            <p><strong>Test Reliable:</strong> ${result.result.test_validity.is_reliable}</p>
            <p><strong>Recommendation:</strong> ${result.result.clinical_recommendation}</p>
        `;

    } catch (error) {
        document.getElementById("result").innerHTML = 
            "<p style='color:red;'>Error connecting to API</p>";
    }
});
</script>

</body>
</html>
